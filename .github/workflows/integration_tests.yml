name: Integration Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  integration-tests:
    name: DFT_${{ matrix.size }} Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        size: [2, 4]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install elan
      run: |
        curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
        echo "$HOME/.elan/bin" >> $GITHUB_PATH

    - name: Cache Lake packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.elan
          .lake
        key: ${{ runner.os }}-lake-${{ hashFiles('lean-toolchain', 'lakefile.lean', 'lake-manifest.json') }}
        restore-keys: |
          ${{ runner.os }}-lake-

    - name: Fetch Mathlib cache
      run: lake exe cache get

    - name: Build trzk compiler driver
      run: lake build trzk

    - name: Install clang
      run: sudo apt-get update && sudo apt-get install -y clang

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Run DFT_${{ matrix.size }} integration test (fixed vectors)
      run: bash integration_tests/run.sh --size ${{ matrix.size }}

    - name: Run DFT_${{ matrix.size }} integration test (fuzz 100k)
      run: bash integration_tests/run.sh --size ${{ matrix.size }} --fuzz -n 100000
