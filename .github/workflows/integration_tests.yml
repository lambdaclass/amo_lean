name: Integration Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  integration-tests:
    name: DFT_4 Integration Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install elan
      run: |
        curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
        echo "$HOME/.elan/bin" >> $GITHUB_PATH

    - name: Cache Lake packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.elan
          .lake
        key: ${{ runner.os }}-lake-${{ hashFiles('lean-toolchain', 'lakefile.lean', 'lake-manifest.json') }}
        restore-keys: |
          ${{ runner.os }}-lake-

    - name: Fetch Mathlib cache
      run: lake exe cache get

    - name: Build trzk compiler driver
      run: lake build trzk

    - name: Install clang
      run: sudo apt-get update && sudo apt-get install -y clang

    - name: Generate C from DFT_4 spec via trzk
      run: .lake/build/bin/trzk integration_tests/dft4_spec.lean --target c --name dft4 --output integration_tests/dft4_spec.c

    - name: Compile generated C with test harness
      run: clang -O2 -o integration_tests/dft4 integration_tests/dft4_spec.c integration_tests/harness_4.c

    - name: Verify C binary against test vectors
      run: python3 integration_tests/verify_dft4.py --binary integration_tests/dft4 integration_tests/test_vectors.txt
