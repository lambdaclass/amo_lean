name: Integration Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  integration-tests:
    name: Spec Integration Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install elan
      run: |
        curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
        echo "$HOME/.elan/bin" >> $GITHUB_PATH

    - name: Cache Lake packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.elan
          .lake
        key: ${{ runner.os }}-lake-${{ hashFiles('lean-toolchain', 'lakefile.lean', 'lake-manifest.json') }}
        restore-keys: |
          ${{ runner.os }}-lake-

    - name: Fetch Mathlib cache
      run: lake exe cache get

    - name: Build trzk compiler driver and CompileSpec module
      run: |
        lake build AmoLean.CompileSpec
        lake build trzk

    - name: Install clang
      run: sudo apt-get update && sudo apt-get install -y clang

    - name: Run all integration tests
      run: ./integration_tests/run_all.sh
